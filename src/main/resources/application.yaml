server:
  port: ${BACKEND_PORT:8000}

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:safety}?currentSchema=service
    username: ${SERVICE_APP_USER:safety_service_app}
    password: ${SERVICE_APP_PASSWORD:safety_service_app_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  auth:
    jwt:
      secret: ${APP_JWT_SECRET:local-development-jwt-secret-must-be-at-least-32-bytes}
      access-token-validity: ${APP_JWT_ACCESS_TOKEN_VALIDITY:15m}
      refresh-token-validity: ${APP_JWT_REFRESH_TOKEN_VALIDITY:14d}
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
  file-storage:
    endpoint: ${APP_MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${APP_MINIO_BUCKET:safety-files}
    access-key: ${APP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${APP_MINIO_SECRET_KEY:minioadmin}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  fastapi:
    base-url: ${APP_FASTAPI_BASE_URL:http://localhost:8001}
    timeout-seconds: ${APP_FASTAPI_TIMEOUT_SECONDS:40}
