name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: safety
          POSTGRES_USER: safety_user
          POSTGRES_PASSWORD: safety_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: safety
          FLYWAY_ENABLED: true
          FLYWAY_USER: safety_user
          FLYWAY_PASSWORD: safety_password
          SERVICE_APP_USER: safety_service_app
          SERVICE_APP_PASSWORD: safety_service_app_password
          APP_JWT_SECRET: local-development-jwt-secret-must-be-at-least-32-bytes
          APP_MINIO_ENDPOINT: http://localhost:9000
        run: ./gradlew test
